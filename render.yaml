services:
  - type: web
    name: pam-water-billing
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Sistem Tagihan Air
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Jakarta
      - key: LOG_CHANNEL
        value: stderr
      - key: PORT
        value: 10000
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: pam-water-billing-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_MIGRATIONS
        value: true
      - key: RUN_SEEDERS
        value: true

databases:
  - name: pam-water-billing-db
    plan: free
    region: singapore
    databaseName: pam_water_billing
    user: pam_user
